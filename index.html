<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <title>Babbu To-Do</title>
</head>
<body>
    <div class="container">
        <h1>Babbu To-Do ✔️</h1>
        
        <div class="glass-box">
            <div style="font-size: 3rem;">🦊</div>
            <p>Cấp: <span id="level">1</span> | EXP: <span id="exp">0</span>/100</p>
            <p>Điểm thưởng (P): <span id="pointsP">0</span></p>
            <div id="timerDisplay" style="font-weight: bold; color: #6c5ce7; margin-top: 10px;"></div>
        </div>
        
        <div class="glass-box" style="margin-top: 15px;">
            <input type="text" id="taskInput" placeholder="Việc cần làm...">
            <button onclick="addTask()">Thêm</button>
            <ul id="taskList"></ul>
            
            <div style="margin-top: 20px;">
                <button onclick="feed('carrot')">🥕 Cà rốt (1P)</button>
                <button onclick="feed('sausage')">🌭 Xúc xích (2P)</button>
                <button onclick="takeBreak()" style="background:#55efc4;">☕ Nghỉ (1P)</button>
                <button onclick="resetApp()" style="background:#ff5252;">↩️ Đặt lại</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
